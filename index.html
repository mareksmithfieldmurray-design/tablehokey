<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Air Hockey - Arena Edition</title>
  <style>
    :root { --cyan:#00e5ff; --bg:#0a0a0a; --rink:#e0f7fa; --rim:#004d40; --pink:#ff4081; --line:rgba(0,150,136,0.25); }
    body {
      margin: 0; background: var(--bg);
      display: flex; justify-content: center; align-items: center; height: 100vh;
      touch-action: none; overflow: hidden; font-family: 'Segoe UI', sans-serif;
    }
    .wrap { position: relative; }
    canvas {
      background: var(--rink); border: 8px solid var(--rim);
      box-shadow: 0 0 50px rgba(0,0,0,0.8); display:block;
      max-width: 100vw; max-height: 100vh; cursor: none;
    }
    #ui { position: absolute; top: 15px; left: 15px; z-index: 100; display:flex; gap:10px; }
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: none; color: white; padding: 20px; z-index: 200;
    }
    .overlay .inner {
      width: min(450px, 90vw); margin: 40px auto; border: 1px solid #333;
      border-radius: 15px; padding: 25px; background: #111;
      box-shadow: 0 0 30px rgba(0,229,255,0.2);
    }
    button {
      padding: 12px 18px; cursor: pointer; background: var(--cyan);
      border: none; font-weight: 800; border-radius: 8px; color:#000; transition: 0.2s;
    }
    button.sec { background: #222; color:#fff; }
    button.warn { background: var(--pink); color:#fff; }
    button:hover { filter: brightness(1.2); }
    
    .flag-selector { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin: 15px 0; }
    .flag-btn { background: #222; border: 2px solid transparent; font-size: 20px; padding: 5px; border-radius: 4px; }
    .flag-btn.active { border-color: var(--cyan); background: #333; }

    #countdown {
      position:absolute; inset:0; display:none; align-items:center; justify-content:center; z-index:250; pointer-events:none;
      font-size: 150px; font-weight: 900; color: white; text-shadow: 0 0 20px var(--cyan);
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div id="ui">
      <button id="btnMenu" class="sec">⚙️</button>
      <button id="btnSound" class="sec">🔇</button>
    </div>
    <div id="countdown">3</div>
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="overlay" class="overlay">
    <div class="inner">
      <h2 style="color:var(--cyan); margin-top:0">ARENA SETTINGS</h2>
      
      <button id="btnFullScreen" style="width:100%; margin-bottom:15px">⛶ PEŁNY EKRAN (FULLSCREEN)</button>
      
      <div style="margin-bottom:20px">
        <button id="btnToggleSound" class="warn" style="width:100%">DŹWIĘK: OFF</button>
      </div>

      <p style="margin:0; font-size:14px">Wybierz flagę Gracza 1 i 2:</p>
      <div id="flagsP1" class="flag-selector"></div>
      <div id="flagsP2" class="flag-selector"></div>

      <div style="display:flex; gap:10px; margin-top:20px">
        <button id="btnResetScores" class="sec">Reset Wyniku</button>
        <button id="btnResume" style="flex-grow:1">WRÓĆ DO GRY</button>
      </div>
    </div>
  </div>

<script>
/* =========================================================================
    1) KONFIGURACJA I AUDIO
   ========================================================================= */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const countdown = document.getElementById('countdown');
const overlay = document.getElementById('overlay');

let isPaused = true;
const FRICTION = 0.988;
const WALL_BOUNCE = 0.7;
const GOAL_WIDTH = 180;
const FLAGS = ['🇵🇱', '🇺🇸', '🇬🇧', '🇩🇪', '🇫🇷', '🇨🇦', '🇧🇷', '🇯🇵', '🇪🇺', '🇦🇷', '🇺🇦', '🇮🇹'];

const puck = { x: 0, y: 0, r: 18, vx: 0, vy: 0 };
const p1 = { x: 0, y: 0, r: 35, score: 0, color: "#d32f2f", flag: '🇵🇱', vx: 0, vy: 0 };
const p2 = { x: 0, y: 0, r: 35, score: 0, color: "#1976d2", flag: '🇪🇺', vx: 0, vy: 0 };

const SFX = (() => {
  let ctxA = null; let enabled = false;
  function ensure(){ if(!ctxA) ctxA = new (window.AudioContext||window.webkitAudioContext)(); if (ctxA.state==='suspended') ctxA.resume(); }
  return {
    impact: (vol) => {
      if (!enabled) return; ensure();
      const o=ctxA.createOscillator(), g=ctxA.createGain();
      o.type='sine'; o.frequency.setValueAtTime(120 + (vol * 200), ctxA.currentTime);
      g.gain.setValueAtTime(vol * 0.3, ctxA.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctxA.currentTime + 0.1);
      o.connect(g).connect(ctxA.destination); o.start(); o.stop(ctxA.currentTime + 0.1);
    },
    setEnabled: (v) => { enabled = v; },
    isEnabled: () => enabled,
    resume: ensure
  };
})();

/* =========================================================================
    2) FIZYKA: ANTY-PRZYKLEJANIE (REBOUND)
   ========================================================================= */
function resolvePlayerCollision(p) {
  const dx = puck.x - p.x, dy = puck.y - p.y, dist = Math.hypot(dx, dy), minDist = puck.r + p.r;
  
  if (dist < minDist) {
    const nx = dx / dist, ny = dy / dist;
    
    // Zapobieganie przyklejaniu: natychmiastowe wypchnięcie poza promień
    puck.x = p.x + nx * (minDist + 1);
    puck.y = p.y + ny * (minDist + 1);

    const pV_dot_N = (p.vx * nx + p.vy * ny);

    if (pV_dot_N > 0) {
      // Uderzenie aktywne (pchnięcie)
      puck.vx = nx * pV_dot_N * 1.5;
      puck.vy = ny * pV_dot_N * 1.5;
      SFX.impact(Math.min(1, pV_dot_N / 15));
    } else {
      // Odbicie pasywne (anty-klej): krążek zawsze odskakuje z minimalną siłą
      const rebound = 3.0; 
      puck.vx = nx * rebound;
      puck.vy = ny * rebound;
      SFX.impact(0.1);
    }
  }
}

/* =========================================================================
    3) RYSOWANIE ARENY I SIATKI
   ========================================================================= */
function drawNet(yStart, isTop) {
    const xStart = canvas.clientWidth / 2 - GOAL_WIDTH / 2;
    const height = 40;
    const step = 15;
    ctx.strokeStyle = "rgba(0,0,0,0.3)";
    ctx.lineWidth = 1;
    
    // Pionowe linie siatki
    for(let x = xStart; x <= xStart + GOAL_WIDTH; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, yStart);
        ctx.lineTo(x, isTop ? yStart - height : yStart + height);
        ctx.stroke();
    }
    // Poziome linie siatki
    for(let y = 0; y <= height; y += step) {
        const currentY = isTop ? yStart - y : yStart + y;
        ctx.beginPath();
        ctx.moveTo(xStart, currentY);
        ctx.lineTo(xStart + GOAL_WIDTH, currentY);
        ctx.stroke();
    }
}

function draw() {
  ctx.fillStyle = "var(--rink)"; ctx.fillRect(0,0,canvas.clientWidth, canvas.clientHeight);
  
  // Linie pola
  ctx.strokeStyle = "var(--line)"; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, canvas.clientHeight/2); ctx.lineTo(canvas.clientWidth, canvas.clientHeight/2); ctx.stroke();
  ctx.beginPath(); ctx.arc(canvas.clientWidth/2, canvas.clientHeight/2, 65, 0, Math.PI*2); ctx.stroke();

  // WYNIK NA ŚRODKU (W kolorze linii)
  ctx.fillStyle = "rgba(0,150,136,0.4)";
  ctx.font = "bold 45px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(p2.score, canvas.clientWidth/2, canvas.clientHeight/2 - 30);
  ctx.fillText(p1.score, canvas.clientWidth/2, canvas.clientHeight/2 + 30);

  // Bramki (Siatki)
  drawNet(0, true);
  drawNet(canvas.clientHeight, false);

  // Gracze
  [p1, p2].forEach(p => {
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.font = "24px serif"; ctx.fillText(p.flag, p.x, p.y + 2);
  });

  // Krążek
  ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI*2); ctx.fill();
}

function step() {
  if (isPaused) return;
  puck.x += puck.vx; puck.y += puck.vy;
  puck.vx *= FRICTION; puck.vy *= FRICTION;

  // Ściany boczne
  if (puck.x < puck.r || puck.x > canvas.clientWidth - puck.r) {
    puck.vx *= -WALL_BOUNCE;
    puck.x = puck.x < puck.r ? puck.r : canvas.clientWidth - puck.r;
  }

  // Bramki (poza canvas - detekcja gola)
  const isGoalX = Math.abs(puck.x - canvas.clientWidth/2) < GOAL_WIDTH/2;
  
  if (puck.y < 0) { // Wpadł do górnej bramki
    p1.score++; onGoal();
  } else if (puck.y > canvas.clientHeight) { // Wpadł do dolnej bramki
    p2.score++; onGoal();
  }

  // Odbicie od ścian góra/dół (z wyłączeniem wejścia do bramki)
  if (!isGoalX) {
    if (puck.y < puck.r) { puck.y = puck.r; puck.vy *= -WALL_BOUNCE; }
    if (puck.y > canvas.clientHeight - puck.r) { puck.y = canvas.clientHeight - puck.r; puck.vy *= -WALL_BOUNCE; }
  }

  resolvePlayerCollision(p1); resolvePlayerCollision(p2);
}

/* =========================================================================
    4) STEROWANIE I UI
   ========================================================================= */
function updatePos(player, newX, newY) {
    if (isPaused) return;
    player.vx = newX - player.x; player.vy = newY - player.y;
    player.x = newX; player.y = newY;
    player.x = Math.max(player.r, Math.min(canvas.clientWidth - player.r, player.x));
    if (player === p1) player.y = Math.max(canvas.clientHeight/2 + player.r, Math.min(canvas.clientHeight - player.r, player.y));
    else player.y = Math.max(player.r, Math.min(canvas.clientHeight/2 - player.r, player.y));
}

canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    updatePos(p1, e.clientX - rect.left, e.clientY - rect.top);
});

canvas.addEventListener('touchmove', e => {
    e.preventDefault(); const rect = canvas.getBoundingClientRect();
    for (let i = 0; i < e.touches.length; i++) {
        const t = e.touches[i], tx = t.clientX - rect.left, ty = t.clientY - rect.top;
        if (ty > canvas.clientHeight/2) updatePos(p1, tx, ty); else updatePos(p2, tx, ty);
    }
}, {passive: false});

function onGoal() {
  isPaused = true;
  saveState();
  setTimeout(() => startCountdown(), 800);
}

function startCountdown() {
    isPaused = true;
    puck.x = canvas.clientWidth/2; puck.y = canvas.clientHeight/2;
    puck.vx = 0; puck.vy = 0;
    p1.x = canvas.clientWidth/2; p1.y = canvas.clientHeight - 50;
    p2.x = canvas.clientWidth/2; p2.y = 50;
    
    let c = 3; countdown.textContent = c; countdown.style.display = 'flex';
    const iv = setInterval(() => {
        c--;
        if (c > 0) { countdown.textContent = c; SFX.impact(0.3); }
        else if (c === 0) { countdown.textContent = "GO!"; }
        else { clearInterval(iv); countdown.style.display = 'none'; isPaused = false; }
    }, 800);
}

// FULLSCREEN
document.getElementById('btnFullScreen').onclick = () => {
    if (!document.fullscreenElement) canvas.parentElement.requestFullscreen().catch(err => alert(err.message));
    else document.exitFullscreen();
};

document.getElementById('btnMenu').onclick = () => { isPaused = true; overlay.style.display = 'block'; };
document.getElementById('btnResume').onclick = () => { overlay.style.display = 'none'; startCountdown(); };
document.getElementById('btnToggleSound').onclick = () => {
    SFX.setEnabled(!SFX.isEnabled()); const on = SFX.isEnabled();
    document.getElementById('btnSound').textContent = on ? '🔊' : '🔇';
    document.getElementById('btnToggleSound').textContent = `DŹWIĘK: ${on ? 'ON' : 'OFF'}`;
    document.getElementById('btnToggleSound').className = on ? '' : 'warn';
    SFX.resume();
};

function buildFlags() {
    [p1, p2].forEach(p => {
        const cont = document.getElementById(p === p1 ? 'flagsP1' : 'flagsP2');
        FLAGS.forEach(f => {
            const b = document.createElement('button'); b.className = `flag-btn ${p.flag === f ? 'active' : ''}`;
            b.textContent = f; b.onclick = () => {
                p.flag = f; Array.from(cont.children).forEach(btn => btn.classList.remove('active'));
                b.classList.add('active'); saveState();
            };
            cont.appendChild(b);
        });
    });
}

function saveState(){ localStorage.setItem('ahp_v5', JSON.stringify({p1s:p1.score, p2s:p2.score, p1f:p1.flag, p2f:p2.flag})); }
function loadState(){
    const s = JSON.parse(localStorage.getItem('ahp_v5') || '{}');
    if(s.p1s !== undefined) { p1.score=s.p1s; p2.score=s.p2s; p1.flag=s.p1f; p2.flag=s.p2f; }
}

function fit() {
    const cssW = Math.min(window.innerWidth, 500); const cssH = window.innerHeight;
    canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
    const dpr = window.devicePixelRatio || 1;
    canvas.width = cssW * dpr; canvas.height = cssH * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function loop() { step(); draw(); requestAnimationFrame(loop); }
window.addEventListener('resize', fit);
fit(); loadState(); buildFlags(); loop();
overlay.style.display = 'block';
</script>
</body>
</html>
